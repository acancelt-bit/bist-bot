name: BIST100 Alert Scan

# BİST seansı 10:00-18:00 TR (UTC+3) => 07:00-15:00 UTC.
# Saat basi, hafta ici. Uyarida haber KAPALI (hizli teknik tarama).
"on":
  schedule:
    - cron: '0 7-15 * * 1-5'
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install yfinance pandas requests

      - name: Taramayi calistir
        env:
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: python bist100_alert.py

      # Tarama patlarsa uyari dus (esik alti = sessiz kalir, o normal).
      - name: Hata bildirimi
        if: failure()
        env:
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TG_CHAT_ID}" \
            --data-urlencode "text=⚠️ BİST saatlik taraması bu saat çalışamadı (workflow hatası). GitHub Actions loglarına bakın."
